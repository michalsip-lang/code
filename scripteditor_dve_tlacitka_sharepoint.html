<script type="text/javascript">
(function () {
    "use strict";

    var RIBBON_GROUP_ID = "Ribbon.ListForm.BOZPPO";
    var RIBBON_TAB_ID = "Ribbon.ListForm.BOZPPO-title";
    var RIBBON_CUSTOM_BODY_ID = "Ribbon.ListForm.BOZPPO";
    var RIBBON_OBSERVER = null;
    var KEEP_ALIVE_TIMER = null;
    var CUSTOM_TAB_ACTIVE = false;
    var GLOBAL_TAB_CLICK_BOUND = false;
    var PRIMARY_ACTION = null;

    var CONFIG = {
        sourceListTitle: "seznam_prodejen",
        sourceFieldInternalName: "lokace_prodejny",
        sourceWebUrl: "http://portal.samohyl.cz/homeZVK",
        sourceListServerRelativeUrl: "/homeZVK/Lists/seznam_prodejen",

        targetListTitle: "kniha_urazu",
        targetFieldInternalName: "osobni_cislo",
        targetWebUrl: "http://portal.samohyl.cz/bozp_po",
        targetListServerRelativeUrl: "/bozp_po/Lists/kniha_urazu",
        targetDispFormUrlBase: "http://portal.samohyl.cz/bozp_po/Lists/kniha_urazu/DispForm.aspx?ID=",
        launchButtonText: "Zobrazit úrazy na prodejně",
        secondaryButtonText: "Přehled zaměstnanců BOZP/PO",
        secondaryButtonLoadingText: "Načítám...",
        ribbonTabTitle: "Doklady BOZP/PO",
        ribbonCardTitle: "Doklady ke kontrole BOZP a PO",
        launchButtonContainerId: "ti-urazy-button-container",
        targetMatchFieldCandidates: [
            "osobni_cislo",
            "osobni_x005f_cislo",
            "OsobniCislo",
            "osobni_cislo_zamestnance",
            "osobni_x005f_cislo_x005f_zamestnance",
            "OsobniCisloZamestnance"
        ],
        targetPersonalNumberFieldCandidates: [
            "nakladove_stredisko",
            "nakladove_x005f_stredisko",
            "NakladoveStredisko",
            "nakladove_strediskoId",
            "nakladove_x005f_strediskoId",
            "NakladoveStrediskoId"
        ],
        targetEmployeeNameFieldCandidates: [
            "jmeno_prijmeni",
            "jmeno_x005f_prijmeni",
            "JmenoPrijmeni"
        ],
        targetDateFieldCandidates: [
            "datum_urazu",
            "datum_x005f_urazu",
            "DatumUrazu",
            "Created"
        ],
        targetDescriptionFieldCandidates: [
            "popis_urazu",
            "popis_x005f_urazu",
            "PopisUrazu",
            "Title"
        ],
        targetSelectFields: [
            "Id",
            "Title",
            "osobni_cislo_zamestnance",
            "popis_urazu",
            "datum_urazu",
            "Created"
        ]
    };

    function getQueryParam(name) {
        var match = RegExp("[?&]" + name + "=([^&]*)", "i").exec(window.location.search);
        return match ? decodeURIComponent(match[1]) : null;
    }

    function toScalarString(value) {
        if (value === null || value === undefined) return "";
        if (Array.isArray(value)) {
            return value.map(function (v) { return toScalarString(v); }).filter(function (v) { return !!v; }).join(", ");
        }
        if (typeof value === "object") {
            if (Object.prototype.hasOwnProperty.call(value, "results") && Array.isArray(value.results)) {
                return value.results.map(function (v) { return toScalarString(v); }).filter(function (v) { return !!v; }).join(", ");
            }
            if (Object.prototype.hasOwnProperty.call(value, "Value")) return String(value.Value);
            if (Object.prototype.hasOwnProperty.call(value, "Label")) return String(value.Label);
            if (Object.prototype.hasOwnProperty.call(value, "Title")) return String(value.Title);
            if (Object.prototype.hasOwnProperty.call(value, "Name")) return String(value.Name);
            if (Object.prototype.hasOwnProperty.call(value, "LookupValue")) return String(value.LookupValue);
            if (Object.prototype.hasOwnProperty.call(value, "LookupId")) return String(value.LookupId);
            return "";
        }
        return String(value);
    }

    function cleanSharePointDisplayValue(value) {
        var raw = toScalarString(value).trim();
        if (!raw) return "";

        var normalizedRaw = raw.replace(/\s*;#\s*/g, ";#");
        var delimiter = null;
        if (normalizedRaw.indexOf(";#") >= 0) {
            delimiter = /;#/;
        } else if (normalizedRaw.indexOf("#") >= 0) {
            delimiter = /#/;
        }

        if (!delimiter) {
            var plainParts = raw.split(/[;,\t\n\r]+/);
            var plainCleaned = [];
            var plainSeen = {};

            for (var j = 0; j < plainParts.length; j++) {
                var plainPart = (plainParts[j] || "").replace(/^[,;\s]+|[,;\s]+$/g, "").trim();
                if (!plainPart) continue;

                var plainKey = plainPart.toLowerCase();
                if (!plainSeen[plainKey]) {
                    plainSeen[plainKey] = true;
                    plainCleaned.push(plainPart);
                }
            }

            if (plainCleaned.length > 0) return plainCleaned.join(", ");
            return raw.replace(/^[,;\s]+|[,;\s]+$/g, "").trim();
        }

        var parts = normalizedRaw.split(delimiter);
        var cleaned = [];
        var seen = {};

        for (var i = 0; i < parts.length; i++) {
            var part = (parts[i] || "").replace(/^[,;\s]+|[,;\s]+$/g, "").trim();
            if (!part) continue;
            if (/^\d+$/.test(part)) continue;

            var key = part.toLowerCase();
            if (!seen[key]) {
                seen[key] = true;
                cleaned.push(part);
            }
        }

        if (cleaned.length > 0) return cleaned.join(", ");

        return normalizedRaw.replace(/;#/g, " ").replace(/#/g, " ");
    }

    function normalizeCompareValue(val) {
        var raw = toScalarString(val).trim();
        if (!raw) return "";

        if (raw.indexOf(";#") >= 0 || raw.indexOf("#") >= 0) {
            var parts = raw.split(/;#|#/);
            var nonEmpty = [];
            for (var p = 0; p < parts.length; p++) {
                var part = (parts[p] || "").trim();
                if (part) nonEmpty.push(part);
            }

            for (var n = 0; n < nonEmpty.length; n++) {
                var numCandidate = nonEmpty[n].replace(/\s+/g, "").replace(",", ".");
                if (/^[-+]?\d+(\.\d+)?$/.test(numCandidate)) {
                    var parsedEncoded = Number(numCandidate);
                    if (!isNaN(parsedEncoded) && isFinite(parsedEncoded)) {
                        return String(parsedEncoded);
                    }
                }
            }

            if (nonEmpty.length) {
                raw = nonEmpty[0];
            }
        }

        var compact = raw.replace(/\s+/g, "");
        var numericLike = compact.replace(",", ".");
        if (/^[-+]?\d+(\.\d+)?$/.test(numericLike)) {
            var parsed = Number(numericLike);
            if (!isNaN(parsed) && isFinite(parsed)) {
                return String(parsed);
            }
        }

        return compact.replace(/^0+/, "").toLowerCase();
    }

    function safeHtml(val) {
        if (val === null || val === undefined) return "";
        return String(val)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/\"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function formatDateTimeCz(val) {
        if (val === null || val === undefined || val === "") return "";

        var asString = toScalarString(val);
        var date;

        var spMatch = /^\/Date\((\d+)(?:[+-]\d+)?\)\/$/.exec(asString);
        if (spMatch) {
            date = new Date(parseInt(spMatch[1], 10));
        } else {
            date = new Date(asString);
        }

        if (isNaN(date.getTime())) {
            return asString;
        }

        var day = date.getDate();
        var month = date.getMonth() + 1;
        var year = date.getFullYear();
        var hours = date.getHours();
        var minutes = date.getMinutes();

        var hh = hours < 10 ? "0" + hours : String(hours);
        var mm = minutes < 10 ? "0" + minutes : String(minutes);

        return day + ". " + month + ". " + year + " " + hh + ":" + mm;
    }

    function httpGetJson(url, success, fail) {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);
        xhr.setRequestHeader("Accept", "application/json;odata=verbose");
        xhr.onreadystatechange = function () {
            if (xhr.readyState !== 4) return;
            if (xhr.status >= 200 && xhr.status < 300) {
                try {
                    success(JSON.parse(xhr.responseText));
                } catch (e) {
                    fail("Neplatná JSON odpověď: " + e.message);
                }
            } else {
                fail("HTTP chyba " + xhr.status + " pro URL: " + url + " | Odpověď: " + (xhr.responseText || ""));
            }
        };
        xhr.send();
    }

    function getFieldValue(item, candidates) {
        if (!item || !candidates || !candidates.length) return "";
        for (var i = 0; i < candidates.length; i++) {
            var key = candidates[i];
            if (Object.prototype.hasOwnProperty.call(item, key) && item[key] !== null && item[key] !== undefined && item[key] !== "") {
                var value = item[key];
                if (typeof value === "object" && toScalarString(value) === "") {
                    continue;
                }
                return value;
            }
        }
        return "";
    }

    function getMatchValueFromItem(item) {
        var fromCandidates = getFieldValue(item, CONFIG.targetMatchFieldCandidates);
        if (fromCandidates !== "" && normalizeCompareValue(fromCandidates) !== "") return fromCandidates;

        var keys = Object.keys(item || {});
        for (var i = 0; i < keys.length; i++) {
            var key = keys[i];
            var lower = key.toLowerCase();
            var looksLikeEmployeeNo = lower.indexOf("osobni") >= 0 && lower.indexOf("cislo") >= 0;
            if (!looksLikeEmployeeNo) continue;

            var value = item[key];
            if (value !== null && value !== undefined && value !== "") {
                if (normalizeCompareValue(value) === "") continue;
                return value;
            }
        }

        return "";
    }

    function getPersonalNumberValueFromItem(item) {
        var fromCandidates = getFieldValue(item, CONFIG.targetPersonalNumberFieldCandidates);
        if (fromCandidates !== "" && cleanSharePointDisplayValue(fromCandidates) !== "") return fromCandidates;

        var keys = Object.keys(item || {});
        for (var i = 0; i < keys.length; i++) {
            var key = keys[i];
            var lower = key.toLowerCase();
            var looksLikeCostCenter = lower.indexOf("nakladove") >= 0 && lower.indexOf("stredisko") >= 0;
            if (!looksLikeCostCenter) continue;

            var value = item[key];
            if (value !== null && value !== undefined && value !== "") {
                if (cleanSharePointDisplayValue(value) === "") continue;
                return value;
            }
        }

        return "";
    }

    function getCurrentListServerRelativeUrl() {
        if (window._spPageContextInfo && _spPageContextInfo.webServerRelativeUrl && _spPageContextInfo.listUrl) {
            var web = _spPageContextInfo.webServerRelativeUrl.replace(/\/$/, "");
            var listUrl = _spPageContextInfo.listUrl;
            if (listUrl.indexOf("/") !== 0) listUrl = "/" + listUrl;
            return web + listUrl;
        }

        var path = window.location.pathname || "";
        var lower = path.toLowerCase();
        var idx = lower.indexOf("/dispform.aspx");
        return idx > 0 ? path.substring(0, idx) : CONFIG.sourceListServerRelativeUrl;
    }

    function buildGetListItemUrl(webUrl, listServerRelativeUrl, itemId, selectFields) {
        return webUrl +
            "/_api/web/GetList(@list)/items(" + itemId + ")" +
            "?@list='" + encodeURIComponent(listServerRelativeUrl) + "'" +
            "&$select=" + selectFields.join(",");
    }

    function buildGetListItemsUrl(webUrl, listServerRelativeUrl, selectFields) {
        var url = webUrl +
            "/_api/web/GetList(@list)/items" +
            "?@list='" + encodeURIComponent(listServerRelativeUrl) + "'" +
            "&$top=5000";

        if (selectFields && selectFields.length) {
            url += "&$select=" + selectFields.join(",");
        }

        return url;
    }

    function isElementVisible(el) {
        if (!el) return false;
        if (el.offsetWidth > 0 || el.offsetHeight > 0) return true;
        if (el.getClientRects && el.getClientRects().length > 0) return true;
        return false;
    }

    function pickVisibleFirst(nodes) {
        if (!nodes || !nodes.length) return null;
        for (var i = 0; i < nodes.length; i++) {
            if (isElementVisible(nodes[i])) return nodes[i];
        }
        return nodes[0] || null;
    }

    function getRibbonBodyHost() {
        var displayBody = document.getElementById("Ribbon.ListForm.Display");
        if (displayBody && isElementVisible(displayBody)) return displayBody;

        var ribbonBodies = document.querySelectorAll("#s4-ribbonrow ul.ms-cui-tabBody");
        var chosenRibbonBody = pickVisibleFirst(ribbonBodies);
        if (chosenRibbonBody) return chosenRibbonBody;

        var allBodies = document.querySelectorAll("ul.ms-cui-tabBody");
        return pickVisibleFirst(allBodies);
    }

    function getRibbonTabsHost() {
        var ribbonTabLists = document.querySelectorAll("#s4-ribbonrow ul.ms-cui-tts, #s4-ribbonrow ul[role='tablist']");
        var chosenRibbonList = pickVisibleFirst(ribbonTabLists);
        if (chosenRibbonList) return chosenRibbonList;

        var allTabLists = document.querySelectorAll("ul.ms-cui-tts, ul[role='tablist']");
        var chosenAnyList = pickVisibleFirst(allTabLists);
        if (chosenAnyList) return chosenAnyList;

        var anyTab = document.querySelector("#s4-ribbonrow li.ms-cui-tt") || document.querySelector("li.ms-cui-tt");
        return anyTab && anyTab.parentNode ? anyTab.parentNode : null;
    }

    function getCustomTabFromHost(tabsHost) {
        if (!tabsHost) return null;
        return tabsHost.querySelector("li[id='" + RIBBON_TAB_ID + "']");
    }

    function getCustomBodyFromHost(bodyHost) {
        if (!bodyHost || !bodyHost.parentNode) return null;
        return bodyHost.parentNode.querySelector("ul[id='" + RIBBON_CUSTOM_BODY_ID + "']");
    }

    function findParentLi(node) {
        var n = node;
        while (n && n !== document) {
            if (n.tagName && n.tagName.toLowerCase() === "li") return n;
            n = n.parentNode;
        }
        return null;
    }

    function isRibbonTabLi(li) {
        if (!li) return false;
        var parent = li.parentNode;
        while (parent && parent !== document) {
            if (parent.tagName && parent.tagName.toLowerCase() === "ul") {
                var className = parent.className || "";
                if (className.indexOf("ms-cui-tts") >= 0 || parent.getAttribute("role") === "tablist") {
                    return true;
                }
            }
            parent = parent.parentNode;
        }
        return false;
    }

    function isCustomTabLi(li) {
        if (!li) return false;
        if (li.id === RIBBON_TAB_ID) return true;
        var label = li.querySelector(".ms-cui-tt-span");
        if (!label) return false;
        var text = (label.textContent || "").replace(/\s+/g, " ").trim();
        return text === CONFIG.ribbonTabTitle;
    }

    function setButtonLoading(a, loading) {
        if (!a) return;
        var label = a.querySelector(".ms-cui-ctl-mediumlabel");
        var original = a.getAttribute("data-original-text") || "";
        if (loading) {
            a.setAttribute("aria-disabled", "true");
            a.style.pointerEvents = "none";
            a.style.opacity = "0.6";
            if (label) label.textContent = a.getAttribute("data-loading-text") || "Načítám...";
        } else {
            a.removeAttribute("aria-disabled");
            a.style.pointerEvents = "";
            a.style.opacity = "";
            if (label) label.textContent = original;
        }
    }

    function showCustomTab() {
        var tabsHost = getRibbonTabsHost();
        var bodyHost = getRibbonBodyHost();
        if ((!tabsHost || !bodyHost || !bodyHost.parentNode) && PRIMARY_ACTION) {
            ensureCustomRibbonGroups(PRIMARY_ACTION);
            tabsHost = getRibbonTabsHost();
            bodyHost = getRibbonBodyHost();
        }
        if (!tabsHost || !bodyHost || !bodyHost.parentNode) return;
        CUSTOM_TAB_ACTIVE = true;

        var tabBodies = bodyHost.parentNode.querySelectorAll("ul.ms-cui-tabBody");
        for (var i = 0; i < tabBodies.length; i++) {
            if (tabBodies[i].id === RIBBON_CUSTOM_BODY_ID) {
                tabBodies[i].style.display = "";
            } else {
                if (!tabBodies[i].hasAttribute("data-ti-prev-display")) {
                    tabBodies[i].setAttribute("data-ti-prev-display", tabBodies[i].style.display || "");
                }
                tabBodies[i].style.display = "none";
            }
        }

        var tabs = tabsHost.querySelectorAll("li.ms-cui-tt");
        for (var t = 0; t < tabs.length; t++) {
            tabs[t].className = (tabs[t].className || "").replace(/\bms-cui-tt-sel\b/g, "").replace(/\s+/g, " ").trim();
            tabs[t].setAttribute("aria-selected", isCustomTabLi(tabs[t]) ? "true" : "false");
        }
        var customTab = getCustomTabFromHost(tabsHost) || document.getElementById(RIBBON_TAB_ID);
        if (customTab && customTab.className.indexOf("ms-cui-tt-sel") === -1) {
            customTab.className = (customTab.className + " ms-cui-tt-sel").replace(/\s+/g, " ").trim();
        }
    }

    function hideCustomTabBody() {
        CUSTOM_TAB_ACTIVE = false;
        var bodyHost = getRibbonBodyHost();
        if (bodyHost && bodyHost.parentNode) {
            var tabBodies = bodyHost.parentNode.querySelectorAll("ul.ms-cui-tabBody");
            for (var i = 0; i < tabBodies.length; i++) {
                if (tabBodies[i].id === RIBBON_CUSTOM_BODY_ID) {
                    tabBodies[i].style.display = "none";
                } else {
                    if (tabBodies[i].hasAttribute("data-ti-prev-display")) {
                        tabBodies[i].style.display = tabBodies[i].getAttribute("data-ti-prev-display") || "";
                        tabBodies[i].removeAttribute("data-ti-prev-display");
                    }
                }
            }
        } else {
            var customBody = document.getElementById(RIBBON_CUSTOM_BODY_ID);
            if (customBody) customBody.style.display = "none";
        }

        var tabsHost = getRibbonTabsHost();
        var customTab = getCustomTabFromHost(tabsHost) || document.getElementById(RIBBON_TAB_ID);
        if (customTab) {
            customTab.className = (customTab.className || "").replace(/\bms-cui-tt-sel\b/g, "").replace(/\s+/g, " ").trim();
            customTab.setAttribute("aria-selected", "false");
        }
    }

    function createRibbonMediumButton(id, text, onClick) {
        var a = document.createElement("a");
        a.className = "ms-cui-ctl-medium";
        a.id = id;
        a.href = "javascript:;";
        a.setAttribute("role", "button");
        a.setAttribute("unselectable", "on");
        a.setAttribute("data-original-text", text);
        a.setAttribute("data-loading-text", "Načítám...");

        var iconContainer = document.createElement("span");
        iconContainer.className = "ms-cui-ctl-iconContainer";
        iconContainer.setAttribute("unselectable", "on");

        var iconHolder = document.createElement("span");
        iconHolder.className = "ms-cui-img-16by16 ms-cui-img-cont-float";
        iconHolder.setAttribute("unselectable", "on");

        var img = document.createElement("img");
        img.src = "/_layouts/15/images/placeholder32x32.png";
        img.style.width = "16px";
        img.style.height = "16px";
        img.setAttribute("unselectable", "on");

        var label = document.createElement("span");
        label.className = "ms-cui-ctl-mediumlabel";
        label.setAttribute("unselectable", "on");
        label.textContent = text;

        iconHolder.appendChild(img);
        iconContainer.appendChild(iconHolder);
        a.appendChild(iconContainer);
        a.appendChild(label);

        a.addEventListener("click", function (e) {
            if (e && e.preventDefault) e.preventDefault();
            setButtonLoading(a, true);
            onClick(function done() {
                setButtonLoading(a, false);
            });
            return false;
        });

        return a;
    }

    function createRibbonGroup(groupId, groupTitleText, button) {
        var li = document.createElement("li");
        li.className = "ms-cui-group";
        li.id = groupId;
        li.setAttribute("unselectable", "on");

        var groupContainer = document.createElement("span");
        groupContainer.className = "ms-cui-groupContainer";
        groupContainer.setAttribute("unselectable", "on");

        var groupBody = document.createElement("span");
        groupBody.className = "ms-cui-groupBody";
        groupBody.setAttribute("unselectable", "on");

        var layout = document.createElement("span");
        layout.className = "ms-cui-layout";
        layout.id = groupId + "-Layout";
        layout.setAttribute("unselectable", "on");

        var section = document.createElement("span");
        section.className = "ms-cui-section";
        section.id = groupId + "-Section";
        section.setAttribute("unselectable", "on");

        var row = document.createElement("span");
        row.className = "ms-cui-row-onerow";
        row.id = groupId + "-Row";
        row.setAttribute("unselectable", "on");

        row.appendChild(button);
        section.appendChild(row);
        layout.appendChild(section);
        groupBody.appendChild(layout);

        var groupTitle = document.createElement("span");
        groupTitle.className = "ms-cui-groupTitle";
        groupTitle.setAttribute("unselectable", "on");
        groupTitle.textContent = groupTitleText;

        groupContainer.appendChild(groupBody);
        groupContainer.appendChild(groupTitle);
        li.appendChild(groupContainer);

        var sep = document.createElement("span");
        sep.className = "ms-cui-groupSeparator";
        sep.setAttribute("unselectable", "on");
        li.appendChild(sep);

        return li;
    }

    function ensureCustomRibbonTab() {
        var tabsHost = getRibbonTabsHost();
        var bodyHost = getRibbonBodyHost();
        if (!tabsHost || !bodyHost || !bodyHost.parentNode) return;

        if (!getCustomTabFromHost(tabsHost)) {
            var sampleTab = tabsHost.querySelector("li.ms-cui-tt") || tabsHost.firstElementChild;
            var tab = document.createElement("li");
            tab.id = RIBBON_TAB_ID;
            tab.className = sampleTab ? (sampleTab.className || "ms-cui-tt").replace(/\bms-cui-tt-sel\b/g, "").trim() : "ms-cui-tt";
            tab.setAttribute("role", "tab");
            tab.setAttribute("aria-selected", "false");
            tab.setAttribute("unselectable", "on");

            var link = document.createElement("a");
            link.href = "javascript:;";
            link.className = "ms-cui-tt-a";
            link.setAttribute("unselectable", "on");

            var label = document.createElement("span");
            label.className = "ms-cui-tt-span";
            label.setAttribute("unselectable", "on");
            label.textContent = CONFIG.ribbonTabTitle;

            link.appendChild(label);
            tab.appendChild(link);
            tabsHost.appendChild(tab);

            link.addEventListener("click", function (e) {
                if (e && e.preventDefault) e.preventDefault();
                if (e && e.stopPropagation) e.stopPropagation();
                showCustomTab();
                return false;
            });

        }

        if (!getCustomBodyFromHost(bodyHost)) {
            var customBody = document.createElement("ul");
            customBody.className = "ms-cui-tabBody";
            customBody.id = RIBBON_CUSTOM_BODY_ID;
            customBody.setAttribute("unselectable", "on");
            customBody.setAttribute("role", "tabpanel");
            customBody.setAttribute("aria-labelledby", RIBBON_TAB_ID);
            customBody.style.display = "none";
            bodyHost.parentNode.appendChild(customBody);
        }

        if (tabsHost.getAttribute("data-ti-tabs-bound") !== "1") {
            tabsHost.setAttribute("data-ti-tabs-bound", "1");
            tabsHost.addEventListener("click", function (e) {
                var li = findParentLi(e.target || e.srcElement);
                if (!li || !isRibbonTabLi(li)) return;
                if (isCustomTabLi(li)) {
                    if (e && e.preventDefault) e.preventDefault();
                    if (e && e.stopPropagation) e.stopPropagation();
                    showCustomTab();
                    return false;
                }
                hideCustomTabBody();
            });
        }

        if (!GLOBAL_TAB_CLICK_BOUND) {
            GLOBAL_TAB_CLICK_BOUND = true;
            document.addEventListener("click", function (e) {
                var li = findParentLi(e.target || e.srcElement);
                if (!li || !isRibbonTabLi(li)) return;
                if (isCustomTabLi(li)) {
                    if (e && e.preventDefault) e.preventDefault();
                    showCustomTab();
                    return false;
                }
                hideCustomTabBody();
            }, true);
        }
    }

    function ensureCustomRibbonGroups(primaryAction) {
        ensureCustomRibbonTab();

        var bodyHost = getRibbonBodyHost();
        var body = getCustomBodyFromHost(bodyHost) || document.getElementById(RIBBON_CUSTOM_BODY_ID);
        if (!body) return;

        if (body.querySelector("li[id='" + RIBBON_GROUP_ID + ".Urazy']")) return;

        body.innerHTML = "";

        var primaryButton = createRibbonMediumButton(RIBBON_GROUP_ID + ".UrazyButton", CONFIG.launchButtonText, function (done) {
            primaryAction(done);
        });
        var secondaryButton = createRibbonMediumButton(RIBBON_GROUP_ID + ".SkoleniButton", CONFIG.secondaryButtonText, function (done) {
            runSecondaryAction(done);
        });

        var groupUrazy = createRibbonGroup(RIBBON_GROUP_ID + ".Urazy", "Úrazy", primaryButton);
        var groupSkoleni = createRibbonGroup(RIBBON_GROUP_ID + ".Skoleni", "BOZP a PO", secondaryButton);

        body.appendChild(groupUrazy);
        body.appendChild(groupSkoleni);
    }

    function startRibbonObserver(primaryAction) {
        if (RIBBON_OBSERVER) return;

        var ribbonRoot = document.body;
        if (!ribbonRoot || !window.MutationObserver) return;

        RIBBON_OBSERVER = new MutationObserver(function () {
            ensureCustomRibbonGroups(primaryAction);
            if (CUSTOM_TAB_ACTIVE) {
                showCustomTab();
            } else {
                hideCustomTabBody();
            }
        });

        RIBBON_OBSERVER.observe(ribbonRoot, { childList: true, subtree: true });
    }

    function startKeepAlive(primaryAction) {
        if (KEEP_ALIVE_TIMER) return;

        KEEP_ALIVE_TIMER = window.setInterval(function () {
            ensureCustomRibbonGroups(primaryAction);
            if (CUSTOM_TAB_ACTIVE) {
                showCustomTab();
            }
        }, 1000);
    }

    function getUrlFromValueSecondary(value) {
        if (value === null || value === undefined) return "";

        if (typeof value === "object") {
            if (Object.prototype.hasOwnProperty.call(value, "Url")) return String(value.Url || "");
            if (Object.prototype.hasOwnProperty.call(value, "url")) return String(value.url || "");
            if (Object.prototype.hasOwnProperty.call(value, "Value")) {
                var inner = String(value.Value || "");
                if (/^https?:\/\//i.test(inner) || inner.indexOf("/") === 0) return inner;
            }
        }

        var text = toScalarString(value).trim();
        if (!text) return "";
        if (/^https?:\/\//i.test(text) || text.indexOf("/") === 0) return text;

        var split = text.split(/\s*[,;]\s*/);
        for (var i = 0; i < split.length; i++) {
            var candidate = (split[i] || "").trim();
            if (/^https?:\/\//i.test(candidate) || candidate.indexOf("/") === 0) return candidate;
        }

        return "";
    }

    function parseSharePointDateSecondary(value) {
        var text = toScalarString(value).trim();
        if (!text) return null;

        var match = /^\/Date\((\d+)(?:[+-]\d+)?\)\/$/.exec(text);
        var date = match ? new Date(parseInt(match[1], 10)) : new Date(text);
        return isNaN(date.getTime()) ? null : date;
    }

    function isEndDateAllowedSecondary(value) {
        var raw = cleanSharePointDisplayValue(value);
        if (!raw) return true;

        var date = parseSharePointDateSecondary(value);
        if (!date) return true;

        var dateOnly = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        var now = new Date();
        var todayOnly = new Date(now.getFullYear(), now.getMonth(), now.getDate());

        return dateOnly > todayOnly;
    }

    function getFieldValueSecondary(item, candidates, fallbackWords) {
        if (!item || !candidates || !candidates.length) return "";
        fallbackWords = fallbackWords || [];

        var i;
        for (i = 0; i < candidates.length; i++) {
            var key = candidates[i];
            if (Object.prototype.hasOwnProperty.call(item, key)) {
                var val = cleanSharePointDisplayValue(item[key]);
                if (val || getUrlFromValueSecondary(item[key])) return item[key];
            }
        }

        var keys = Object.keys(item || {});
        for (i = 0; i < keys.length; i++) {
            var k = keys[i].toLowerCase();
            var all = true;
            for (var j = 0; j < fallbackWords.length; j++) {
                if (k.indexOf(fallbackWords[j]) === -1) {
                    all = false;
                    break;
                }
            }
            if (!all) continue;
            var value = cleanSharePointDisplayValue(item[keys[i]]);
            if (value || getUrlFromValueSecondary(item[keys[i]])) return item[keys[i]];
        }
        return "";
    }

    function showSecondaryModal(items, locationValue) {
        var html = [];
        html.push("<div style='padding:8px;font-family:Segoe UI,Arial,sans-serif;width:100%;max-width:100%;box-sizing:border-box;'>");
        html.push("<div style='margin-bottom:8px;'><b>Středisko:</b> " + safeHtml(cleanSharePointDisplayValue(locationValue || "")) + "</div>");
        html.push("<div style='margin-bottom:8px;'><b>Nalezeno zaměstnanců:</b> " + items.length + "</div>");
        html.push("<div style='width:100%;max-width:100%;overflow:hidden;'>");
        html.push("<table style='width:100%;max-width:100%;border-collapse:collapse;table-layout:fixed;font-size:12px;line-height:1.25;'>");
        html.push("<thead>");
        html.push("<tr>");
        html.push("<th style='border:1px solid #ddd;padding:4px;' colspan='3'></th>");
        html.push("<th style='border:1px solid #ddd;padding:4px;text-align:center;' colspan='3'>Školení BOZP</th>");
        html.push("<th style='border:1px solid #ddd;padding:4px;text-align:center;' colspan='3'>Školení PO</th>");
        html.push("</tr>");
        html.push("<tr>");
        html.push("<th style='border:1px solid #ddd;padding:4px;width:12%;'>Odkaz</th>");
        html.push("<th style='border:1px solid #ddd;padding:4px;width:10%;'>Osobní číslo</th>");
        html.push("<th style='border:1px solid #ddd;padding:4px;width:16%;'>Jméno a příjmení</th>");
        html.push("<th style='border:1px solid #ddd;padding:4px;width:10%;'>Stav</th>");
        html.push("<th style='border:1px solid #ddd;padding:4px;width:14%;'>Datum posledního školení</th>");
        html.push("<th style='border:1px solid #ddd;padding:4px;width:12%;'>Odkaz na školení BOZP</th>");
        html.push("<th style='border:1px solid #ddd;padding:4px;width:10%;'>Stav</th>");
        html.push("<th style='border:1px solid #ddd;padding:4px;width:14%;'>Datum posledního školení</th>");
        html.push("<th style='border:1px solid #ddd;padding:4px;width:12%;'>Odkaz na školení PO</th>");
        html.push("</tr></thead><tbody>");

        for (var i = 0; i < items.length; i++) {
            var it = items[i];
            var titleValue = getFieldValueSecondary(it, ["Title"], ["title"]) || it.Title || "Zobrazit";
            var personalNumber = getFieldValueSecondary(it, ["osobni_cislo_zamestnance", "osobni_x005f_cislo_x005f_zamestnance", "OsobniCisloZamestnance"], ["osobni", "cislo"]);
            var firstName = getFieldValueSecondary(it, ["jmeno_zamestnance", "jmeno_x005f_zamestnance", "JmenoZamestnance"], ["jmeno", "zamest"]);
            var lastName = getFieldValueSecondary(it, ["prijmeni_zamestance", "prijmeni_zamestnance", "prijmeni_x005f_zamestance", "prijmeni_x005f_zamestnance", "PrijmeniZamestance", "PrijmeniZamestnance"], ["prijmeni", "zamest"]);
            var fullName = (cleanSharePointDisplayValue(firstName) + " " + cleanSharePointDisplayValue(lastName)).replace(/\s+/g, " ").trim();
            var itemUrl = "http://portal.samohyl.cz/bozp_po/Lists/zamestnanci/DispForm.aspx?ID=" + encodeURIComponent(it.Id);

            var bozpStatus = getFieldValueSecondary(it, ["stav_skoleni_bozp", "stav_x005f_skoleni_x005f_bozp", "StavSkoleniBOZP"], ["stav", "bozp"]);
            var bozpLastDate = getFieldValueSecondary(it, ["vstupni_skoleni_bozp", "vstupni_x005f_skoleni_x005f_bozp", "VstupniSkoleniBOZP"], ["datum", "posled", "bozp"]);
            var bozpLinkValue = getFieldValueSecondary(it, ["odkaz_test_bozp", "odkaz_x005f_test_x005f_bozp", "OdkazTestBOZP"], ["odkaz", "bozp"]);
            var bozpLinkUrl = getUrlFromValueSecondary(bozpLinkValue);

            var poStatus = getFieldValueSecondary(it, ["stav_skoleni_po", "stav_x005f_skoleni_x005f_po", "StavSkoleniPO"], ["stav", "po"]);
            var poLastDate = getFieldValueSecondary(it, ["opakovane_skoleni_po", "opakovane_x005f_skoleni_x005f_po", "OpakovaneSkoleniPO"], ["datum", "posled", "po"]);
            var poLinkValue = getFieldValueSecondary(it, ["odkaz_na_skoleni_po", "odkaz_x005f_na_x005f_skoleni_x005f_po", "OdkazNaSkoleniPO"], ["odkaz", "po"]);
            var poLinkUrl = getUrlFromValueSecondary(poLinkValue);

            html.push("<tr>");
            html.push("<td style='border:1px solid #ddd;padding:4px;word-break:break-word;overflow-wrap:anywhere;'><a href='" + safeHtml(itemUrl) + "' target='_blank' style='word-break:break-word;overflow-wrap:anywhere;'>" + safeHtml(cleanSharePointDisplayValue(titleValue)) + "</a></td>");
            html.push("<td style='border:1px solid #ddd;padding:4px;word-break:break-word;overflow-wrap:anywhere;'>" + safeHtml(cleanSharePointDisplayValue(personalNumber)) + "</td>");
            html.push("<td style='border:1px solid #ddd;padding:4px;word-break:break-word;overflow-wrap:anywhere;'>" + safeHtml(fullName) + "</td>");
            html.push("<td style='border:1px solid #ddd;padding:4px;word-break:break-word;overflow-wrap:anywhere;'>" + safeHtml(cleanSharePointDisplayValue(bozpStatus)) + "</td>");
            html.push("<td style='border:1px solid #ddd;padding:4px;word-break:break-word;overflow-wrap:anywhere;'>" + safeHtml(formatDateTimeCz(bozpLastDate) || cleanSharePointDisplayValue(bozpLastDate)) + "</td>");
            html.push("<td style='border:1px solid #ddd;padding:4px;word-break:break-word;overflow-wrap:anywhere;'>" + (bozpLinkUrl ? "<a href='" + safeHtml(bozpLinkUrl) + "' target='_blank' style='word-break:break-word;overflow-wrap:anywhere;'>Otevřít školení</a>" : "") + "</td>");
            html.push("<td style='border:1px solid #ddd;padding:4px;word-break:break-word;overflow-wrap:anywhere;'>" + safeHtml(cleanSharePointDisplayValue(poStatus)) + "</td>");
            html.push("<td style='border:1px solid #ddd;padding:4px;word-break:break-word;overflow-wrap:anywhere;'>" + safeHtml(formatDateTimeCz(poLastDate) || cleanSharePointDisplayValue(poLastDate)) + "</td>");
            html.push("<td style='border:1px solid #ddd;padding:4px;word-break:break-word;overflow-wrap:anywhere;'>" + (poLinkUrl ? "<a href='" + safeHtml(poLinkUrl) + "' target='_blank' style='word-break:break-word;overflow-wrap:anywhere;'>Otevřít školení</a>" : "") + "</td>");
            html.push("</tr>");
        }

        html.push("</tbody></table></div></div>");

        var container = document.createElement("div");
        container.innerHTML = html.join("");

        var viewportWidth = window.innerWidth || document.documentElement.clientWidth || 1280;
        var viewportHeight = window.innerHeight || document.documentElement.clientHeight || 800;
        var modalWidth = Math.max(760, Math.floor(viewportWidth * 0.98));
        var modalHeight = Math.max(560, Math.floor(viewportHeight * 0.92));

        if (window.SP && SP.UI && SP.UI.ModalDialog && typeof SP.UI.ModalDialog.showModalDialog === "function") {
            SP.UI.ModalDialog.showModalDialog({
                title: "Přehled zaměstnanců a školení BOZP/PO",
                html: container,
                allowMaximize: true,
                showClose: true,
                autoSize: false,
                width: modalWidth,
                height: modalHeight
            });
            return;
        }

        alert("Přehled zaměstnanců a školení BOZP/PO je připraven.");
    }

    function runSecondaryAction(done) {
        var itemId = getQueryParam("ID");
        if (!itemId) {
            console.error("ID položky není v URL.");
            if (typeof done === "function") done();
            return;
        }

        var sourceUrl = buildGetListItemUrl(
            "http://portal.samohyl.cz/homeZVK",
            getCurrentListServerRelativeUrl(),
            itemId,
            ["Id", "lokace_prodejny"]
        );

        httpGetJson(sourceUrl, function (sourceData) {
            var sourceItem = sourceData && sourceData.d ? sourceData.d : null;
            if (!sourceItem) {
                console.error("Nelze načíst zdrojovou položku prodejny.");
                if (typeof done === "function") done();
                return;
            }

            var locationValue = sourceItem.lokace_prodejny;
            var locationNorm = normalizeCompareValue(locationValue);
            if (!locationNorm) {
                console.error("Pole lokace_prodejny je prázdné.");
                if (typeof done === "function") done();
                return;
            }

            var url = "http://portal.samohyl.cz/bozp_po" +
                "/_api/web/GetList(@list)/items" +
                "?@list='" + encodeURIComponent("/bozp_po/Lists/zamestnanci") + "'" +
                "&$top=5000";

            httpGetJson(url, function (data) {
                var items = (data && data.d && data.d.results) ? data.d.results : [];
                var filtered = [];

                for (var i = 0; i < items.length; i++) {
                    var centerValue = getFieldValueSecondary(items[i], ["stredisko_zamestnance", "stredisko_x005f_zamestnance", "StrediskoZamestnance"], ["stredisko", "zamestnance"]);
                    var centerNorm = normalizeCompareValue(centerValue);
                    var endDateValue = getFieldValueSecondary(items[i], ["datum_ukonceni", "datum_x005f_ukonceni", "DatumUkonceni"], ["datum", "ukonceni"]);
                    var endDateAllowed = isEndDateAllowedSecondary(endDateValue);

                    if (centerNorm && centerNorm === locationNorm && endDateAllowed) {
                        filtered.push(items[i]);
                    }
                }

                showSecondaryModal(filtered, locationValue);
                if (typeof done === "function") done();
            }, function (err2) {
                console.error("Chyba načtení přehledu zaměstnanců:", err2);
                if (typeof done === "function") done();
            });
        }, function (err1) {
            console.error("Chyba načtení položky prodejny:", err1);
            if (typeof done === "function") done();
        });
    }

    function showMatchesModal(locationValue, matches) {
        var html = [];
        html.push("<div style='padding:12px; font-family:Segoe UI,Arial,sans-serif;'>");
        html.push("<div style='margin-bottom:10px;'><b>Středisko (lokace_prodejny):</b> " + safeHtml(locationValue) + "</div>");
        html.push("<div style='margin-bottom:8px;'><b>Nalezeno úrazů:</b> " + matches.length + "</div>");
        html.push("<table style='width:100%; border-collapse:collapse;'>");
        html.push("<thead><tr>");
        html.push("<th style='border:1px solid #ddd; padding:6px;'>ID</th>");
        html.push("<th style='border:1px solid #ddd; padding:6px;'>Název</th>");
        html.push("<th style='border:1px solid #ddd; padding:6px;'>Osobní číslo</th>");
        html.push("<th style='border:1px solid #ddd; padding:6px;'>Zaměstnanec</th>");
        html.push("<th style='border:1px solid #ddd; padding:6px;'>Datum úrazu</th>");
        html.push("</tr></thead><tbody>");

        for (var i = 0; i < matches.length; i++) {
            var it = matches[i];
            var employeeCell = getPersonalNumberValueFromItem(it);
            var dateCell = getFieldValue(it, CONFIG.targetDateFieldCandidates);
            var employeeNameCell = getFieldValue(it, CONFIG.targetEmployeeNameFieldCandidates);
            var itemId = it.Id;
            var itemTitle = it.Title || "(bez názvu)";
            var itemUrl = CONFIG.targetDispFormUrlBase + encodeURIComponent(itemId);
            html.push("<tr>");
            html.push("<td style='border:1px solid #ddd; padding:6px;'>" + safeHtml(it.Id) + "</td>");
            html.push("<td style='border:1px solid #ddd; padding:6px;'><a href='" + safeHtml(itemUrl) + "' target='_blank'>" + safeHtml(itemTitle) + "</a></td>");
            html.push("<td style='border:1px solid #ddd; padding:6px;'>" + safeHtml(cleanSharePointDisplayValue(employeeCell)) + "</td>");
            html.push("<td style='border:1px solid #ddd; padding:6px;'>" + safeHtml(cleanSharePointDisplayValue(employeeNameCell || "")) + "</td>");
            html.push("<td style='border:1px solid #ddd; padding:6px;'>" + safeHtml(formatDateTimeCz(dateCell || "")) + "</td>");
            html.push("</tr>");
        }

        html.push("</tbody></table>");
        html.push("</div>");

        var container = document.createElement("div");
        container.innerHTML = html.join("");

        SP.UI.ModalDialog.showModalDialog({
            title: "Přehled úrazů na středisku",
            html: container,
            allowMaximize: true,
            showClose: true,
            autoSize: true
        });
    }

    function run(done) {
        var itemId = getQueryParam("ID");
        if (!itemId) {
            console.log("ID položky není v URL.");
            if (typeof done === "function") done();
            return;
        }

        var sourceListServerRelativeUrl = getCurrentListServerRelativeUrl();
        var sourceUrl = buildGetListItemUrl(
            CONFIG.sourceWebUrl,
            sourceListServerRelativeUrl,
            itemId,
            ["Id", CONFIG.sourceFieldInternalName, "Title"]
        );

        httpGetJson(sourceUrl, function (sourceData) {
            var sourceItem = sourceData && sourceData.d ? sourceData.d : null;
            if (!sourceItem) {
                if (typeof done === "function") done();
                return;
            }

            var locationRaw = sourceItem[CONFIG.sourceFieldInternalName];
            if (!locationRaw) {
                console.log("Pole " + CONFIG.sourceFieldInternalName + " je prázdné.");
                if (typeof done === "function") done();
                return;
            }

            var locationNorm = normalizeCompareValue(locationRaw);

            var targetUrl = buildGetListItemsUrl(
                CONFIG.targetWebUrl,
                CONFIG.targetListServerRelativeUrl,
                null
            );

            httpGetJson(targetUrl, function (targetData) {
                var results = (targetData && targetData.d && targetData.d.results) ? targetData.d.results : [];
                var matches = [];

                for (var i = 0; i < results.length; i++) {
                    var employeeValue = getMatchValueFromItem(results[i]) || results[i][CONFIG.targetFieldInternalName];
                    var employeeRaw = toScalarString(employeeValue).trim();
                    var employeeNorm = normalizeCompareValue(employeeRaw);

                    if (employeeNorm && employeeNorm === locationNorm) {
                        matches.push(results[i]);
                    }
                }

                if (matches.length > 0) {
                    showMatchesModal(locationRaw, matches);
                } else {
                    console.log("Pro lokaci '" + locationRaw + "' nebyla nalezena shoda v Kniha_urazu.");
                }
                if (typeof done === "function") done();
            }, function (err2) {
                console.error("Chyba načtení seznamu kniha_urazu:", err2);
                if (typeof done === "function") done();
            });

        }, function (err1) {
            console.error("Chyba načtení položky seznam_prodejen:", err1);
            if (typeof done === "function") done();
        });
    }

    function init() {
        var primaryAction = function (done) {
            if (window.SP && SP.SOD && SP.SOD.executeOrDelayUntilScriptLoaded) {
                SP.SOD.executeOrDelayUntilScriptLoaded(function () { run(done); }, "sp.js");
            } else {
                run(done);
            }
        };
        PRIMARY_ACTION = primaryAction;

        ensureCustomRibbonGroups(primaryAction);
        hideCustomTabBody();
        startRibbonObserver(primaryAction);
        startKeepAlive(primaryAction);
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
    } else {
        init();
    }
})();
</script>
